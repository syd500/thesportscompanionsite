<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — The Sports Companion</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink:#0B0D0F; --ink-2:#181B1F; --ink-3:#262A30; --muted:#8A8F98; --line:#2A2E35; --gold:#F2C230; --crimson:#C83A2B; --white:#FFFFFF; }
    body { font-family: 'Inter', sans-serif; background: var(--ink); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; background: rgba(11,13,15,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
    .nav-brand { display: flex; align-items: center; gap: 8px; padding: 0 20px; text-decoration: none; height: 56px; }
    .nav-brand img { height: 28px; }
    .nav-brand span { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1rem; color: var(--white); }
    .nav-brand span em { font-style: normal; color: var(--gold); }
    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 20px; }
    .card { background: var(--ink-2); border: 1px solid var(--line); border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 440px; }
    .card-header { text-align: center; margin-bottom: 28px; }
    .card-icon { font-size: 2.2rem; margin-bottom: 12px; }
    .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
    .card-sub { font-size: 0.84rem; color: var(--muted); }
    .social-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px 16px; border-radius: 8px; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; border: 1px solid var(--line); background: var(--ink-3); color: var(--white); }
    .social-btn:hover { border-color: var(--gold); background: rgba(242,194,48,0.05); }
    .social-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider-line { flex: 1; height: 1px; background: var(--line); }
    .divider-text { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; font-family: 'JetBrains Mono', monospace; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; padding: 11px 14px; background: var(--ink-3); border: 1px solid var(--line);
      border-radius: 7px; color: var(--white); font-size: 0.9rem; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s; outline: none;
    }
    input:focus { border-color: var(--gold); }
    input::placeholder { color: var(--muted); }
    .password-strength { height: 3px; border-radius: 2px; margin-top: 5px; transition: all 0.3s; background: var(--line); }
    .strength-weak   { background: #FF6B6B; width: 33%; }
    .strength-medium { background: var(--gold); width: 66%; }
    .strength-strong { background: #22c55e; width: 100%; }
    .strength-label  { font-size: 0.68rem; color: var(--muted); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }
    .terms { font-size: 0.76rem; color: var(--muted); margin: 12px 0; line-height: 1.5; }
    .terms a { color: var(--gold); text-decoration: none; }
    .submit-btn { width: 100%; padding: 13px; background: var(--gold); color: var(--ink); font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s; }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { background: rgba(200,58,43,0.12); border: 1px solid rgba(200,58,43,0.3); color: #FF6B6B; border-radius: 7px; padding: 10px 14px; font-size: 0.82rem; margin-bottom: 14px; display: none; }
    .error-msg.show { display: block; }
    .card-footer { text-align: center; margin-top: 20px; font-size: 0.83rem; color: var(--muted); }
    .card-footer a { color: var(--gold); text-decoration: none; font-weight: 600; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(11,13,15,0.3); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { border-top: 1px solid var(--line); padding: 20px 32px; text-align: center; font-size: 0.74rem; color: var(--muted); }
  </style>
</head>
<body>

<nav>
  <a href="/index.html" class="nav-brand">
    <img src="/assets/logo.png" alt="SSC" />
    <span>The Sports <em>Companion</em></span>
  </a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">⭐</div>
      <div class="card-title">Create Account</div>
      <div class="card-sub">Free forever · No credit card needed</div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <!-- GOOGLE -->
    <button class="social-btn" id="btn-google" onclick="signUpGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign up with Google
    </button>

    <!-- APPLE -->
    <button class="social-btn" id="btn-apple" onclick="signUpApple()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="white">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      Sign up with Apple
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or sign up with email</div>
      <div class="divider-line"></div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="firstname">First Name</label>
        <input type="text" id="firstname" placeholder="Chris" autocomplete="given-name" />
      </div>
      <div class="form-group">
        <label for="lastname">Last Name</label>
        <input type="text" id="lastname" placeholder="Cain" autocomplete="family-name" />
      </div>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)" />
      <div class="password-strength" id="strength-bar"></div>
      <div class="strength-label" id="strength-label"></div>
    </div>

    <div class="terms">
      By creating an account you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </div>

    <button class="submit-btn" id="btn-signup" onclick="signUpEmail()">Create Account</button>

    <div class="card-footer">
      Already have an account? <a href="/login/index.html">Log in</a>
    </div>
  </div>
</div>

<footer>© 2026 The Sports Companion</footer>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, createUserWithEmailAndPassword, updateProfile,
           signInWithPopup, GoogleAuthProvider, OAuthProvider,
           onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  // ── REPLACE WITH YOUR FIREBASE CONFIG ────────────────────────
  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };
  // ─────────────────────────────────────────────────────────────

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  onAuthStateChanged(auth, user => {
    if (user) window.location.href = '/profile/index.html';
  });

  // Create user doc in Firestore with default preferences
  async function createUserProfile(user, displayName) {
    await setDoc(doc(db, 'users', user.uid), {
      displayName: displayName || user.displayName || '',
      email: user.email,
      createdAt: serverTimestamp(),
      favoriteSports: [],
      favoriteTeams: {},
      notifications: {
        emailDigest: 'weekly',
        gameAlerts:  true,
        scoreUpdates: true,
        fantasyAlerts: false,
      }
    }, { merge: true });
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.classList.add('show');
  }

  function setLoading(id, on) {
    const btn = document.getElementById(id);
    if (on) { btn.disabled = true; btn.dataset.orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span> Creating account…'; }
    else    { btn.disabled = false; btn.innerHTML = btn.dataset.orig; }
  }

  window.checkStrength = (pw) => {
    const bar = document.getElementById('strength-bar');
    const lbl = document.getElementById('strength-label');
    if (!pw) { bar.className = 'password-strength'; lbl.textContent = ''; return; }
    const strong = pw.length >= 10 && /[A-Z]/.test(pw) && /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw);
    const medium = pw.length >= 8 && /[A-Z]/.test(pw) && /[0-9]/.test(pw);
    if (strong) { bar.className = 'password-strength strength-strong'; lbl.textContent = 'Strong'; lbl.style.color = '#22c55e'; }
    else if (medium) { bar.className = 'password-strength strength-medium'; lbl.textContent = 'Medium'; lbl.style.color = 'var(--gold)'; }
    else { bar.className = 'password-strength strength-weak'; lbl.textContent = 'Weak'; lbl.style.color = '#FF6B6B'; }
  };

  const REDIRECT = '/profile/index.html?setup=1';

  window.signUpEmail = async () => {
    const first    = document.getElementById('firstname').value.trim();
    const last     = document.getElementById('lastname').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return showError('Please fill in all fields.');
    if (password.length < 8) return showError('Password must be at least 8 characters.');
    setLoading('btn-signup', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const name = [first, last].filter(Boolean).join(' ');
      if (name) await updateProfile(cred.user, { displayName: name });
      await createUserProfile(cred.user, name);
      window.location.href = REDIRECT;
    } catch (e) {
      setLoading('btn-signup', false);
      const msgs = {
        'auth/email-already-in-use': 'An account with that email already exists.',
        'auth/invalid-email':        'Please enter a valid email address.',
        'auth/weak-password':        'Password must be at least 8 characters.',
      };
      showError(msgs[e.code] || 'Sign-up failed. Please try again.');
    }
  };

  window.signUpGoogle = async () => {
    setLoading('btn-google', true);
    try {
      const cred = await signInWithPopup(auth, new GoogleAuthProvider());
      await createUserProfile(cred.user, cred.user.displayName);
      window.location.href = REDIRECT;
    } catch (e) {
      setLoading('btn-google', false);
      if (e.code !== 'auth/popup-closed-by-user') showError('Google sign-up failed. Please try again.');
    }
  };

  window.signUpApple = async () => {
    setLoading('btn-apple', true);
    try {
      const provider = new OAuthProvider('apple.com');
      provider.addScope('email'); provider.addScope('name');
      const cred = await signInWithPopup(auth, provider);
      await createUserProfile(cred.user, cred.user.displayName);
      window.location.href = REDIRECT;
    } catch (e) {
      setLoading('btn-apple', false);
      if (e.code !== 'auth/popup-closed-by-user') showError('Apple sign-up failed. Please try again.');
    }
  };
</script>
</body>
</html>
