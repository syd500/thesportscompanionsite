<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — SportsCompanion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:    #0B0D0F;
      --ink-2:  #181B1F;
      --line:   #2A2E35;
      --signal: #F2C230;
      --muted:  #8A8F98;
      --white:  #FFFFFF;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--ink); color: var(--white);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px; text-align: center;
    }
    .logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 48px;
      text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 1.25rem; letter-spacing: 0.04em; color: var(--white);
    }
    .logo img { height: 36px; }
    .logo span { color: var(--signal); }
    .check {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(242,194,48,0.12);
      border: 2px solid var(--signal);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 32px;
    }
    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.15em;
      color: var(--signal); text-transform: uppercase; margin-bottom: 16px;
    }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900; text-transform: uppercase; line-height: 0.95;
      margin-bottom: 20px;
    }
    h1 span { color: var(--signal); }
    p {
      color: var(--muted); font-size: 1rem; line-height: 1.65;
      max-width: 420px; margin: 0 auto 40px;
    }
    .back {
      display: inline-block;
      border: 1px solid var(--line); color: var(--white);
      font-weight: 500; font-size: 0.9rem;
      padding: 12px 28px; border-radius: 6px;
      text-decoration: none; transition: border-color 0.2s;
    }
    .back:hover { border-color: var(--signal); color: var(--signal); }
    .dots {
      position: fixed; inset: 0; z-index: -1; opacity: 0.04;
      background-image: radial-gradient(var(--signal) 1px, transparent 1px);
      background-size: 28px 28px;
    }
  </style>
</head>
<body>
  <div class="dots"></div>
  <a href="/" class="logo">
    <img src="assets/logo.png" alt="SSC" />
    Sports<span>Companion</span>
  </a>
  <div class="check">✓</div>
  <div class="eyebrow">// You're in</div>
  <h1>You're on<br/>the <span>list</span></h1>
  <p>Thanks for signing up! We'll reach out with early access details and a free month of premium analytics when we launch.</p>
  <a href="/" class="back">← Back to home</a>
</body>
</html>
