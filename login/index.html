<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — The Sports Companion</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink:#0B0D0F; --ink-2:#181B1F; --ink-3:#262A30; --muted:#8A8F98; --line:#2A2E35; --gold:#F2C230; --crimson:#C83A2B; --white:#FFFFFF; }
    body { font-family: 'Inter', sans-serif; background: var(--ink); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; }

    nav { display: flex; align-items: center; background: rgba(11,13,15,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
    .nav-brand { display: flex; align-items: center; gap: 8px; padding: 0 20px; text-decoration: none; height: 56px; }
    .nav-brand img { height: 28px; }
    .nav-brand span { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1rem; letter-spacing: 0.04em; color: var(--white); }
    .nav-brand span em { font-style: normal; color: var(--gold); }

    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 20px; }

    .card { background: var(--ink-2); border: 1px solid var(--line); border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 420px; }

    .card-header { text-align: center; margin-bottom: 32px; }
    .card-icon { font-size: 2.2rem; margin-bottom: 12px; }
    .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
    .card-sub { font-size: 0.84rem; color: var(--muted); }

    /* SOCIAL BUTTONS */
    .social-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px 16px; border-radius: 8px; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; border: 1px solid var(--line); background: var(--ink-3); color: var(--white); }
    .social-btn:hover { border-color: var(--gold); background: rgba(242,194,48,0.05); }
    .social-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .social-btn.apple { font-size: 0.88rem; }

    /* DIVIDER */
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider-line { flex: 1; height: 1px; background: var(--line); }
    .divider-text { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

    /* FORM */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 11px 14px; background: var(--ink-3); border: 1px solid var(--line);
      border-radius: 7px; color: var(--white); font-size: 0.9rem; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s; outline: none;
    }
    input:focus { border-color: var(--gold); }
    input::placeholder { color: var(--muted); }

    .forgot { display: block; text-align: right; font-size: 0.76rem; color: var(--muted); text-decoration: none; margin-top: 4px; }
    .forgot:hover { color: var(--gold); }

    .submit-btn { width: 100%; padding: 13px; background: var(--gold); color: var(--ink); font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; border: none; border-radius: 8px; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { background: rgba(200,58,43,0.12); border: 1px solid rgba(200,58,43,0.3); color: #FF6B6B; border-radius: 7px; padding: 10px 14px; font-size: 0.82rem; margin-bottom: 16px; display: none; }
    .error-msg.show { display: block; }

    .card-footer { text-align: center; margin-top: 24px; font-size: 0.83rem; color: var(--muted); }
    .card-footer a { color: var(--gold); text-decoration: none; font-weight: 600; }
    .card-footer a:hover { text-decoration: underline; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(11,13,15,0.3); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { border-top: 1px solid var(--line); padding: 20px 32px; text-align: center; font-size: 0.74rem; color: var(--muted); }
  </style>
</head>
<body>

<nav>
  <a href="/index.html" class="nav-brand">
    <img src="/assets/logo.png" alt="SSC" />
    <span>The Sports <em>Companion</em></span>
  </a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">🏆</div>
      <div class="card-title">Welcome Back</div>
      <div class="card-sub">Log in to your Sports Companion account</div>
    </div>

    <!-- ERROR -->
    <div class="error-msg" id="error-msg"></div>

    <!-- GOOGLE -->
    <button class="social-btn" id="btn-google" onclick="signInGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <!-- APPLE -->
    <button class="social-btn apple" id="btn-apple" onclick="signInApple()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="white">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      Continue with Apple
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or</div>
      <div class="divider-line"></div>
    </div>

    <!-- EMAIL FORM -->
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      <a href="/login/forgot.html" class="forgot">Forgot password?</a>
    </div>

    <button class="submit-btn" id="btn-login" onclick="signInEmail()">Log In</button>

    <div class="card-footer">
      Don't have an account? <a href="/signup/index.html">Sign up free</a>
    </div>
  </div>
</div>

<footer>© 2026 The Sports Companion · <a href="/index.html" style="color:var(--muted)">Home</a></footer>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signInWithPopup,
           GoogleAuthProvider, OAuthProvider, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  // ── REPLACE WITH YOUR FIREBASE CONFIG ────────────────────────
  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };
  // ─────────────────────────────────────────────────────────────

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Redirect if already logged in
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = '/profile/index.html';
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function setLoading(id, loading) {
    const btn = document.getElementById(id);
    if (loading) {
      btn.disabled = true;
      btn.dataset.orig = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> Signing in…';
    } else {
      btn.disabled = false;
      btn.innerHTML = btn.dataset.orig;
    }
  }

  const REDIRECT = '/profile/index.html';

  window.signInEmail = async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return showError('Please enter your email and password.');
    setLoading('btn-login', true);
    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = REDIRECT;
    } catch (e) {
      setLoading('btn-login', false);
      const msgs = {
        'auth/user-not-found':   'No account found with that email.',
        'auth/wrong-password':   'Incorrect password. Try again.',
        'auth/invalid-email':    'Please enter a valid email address.',
        'auth/too-many-requests':'Too many attempts. Please try again later.',
      };
      showError(msgs[e.code] || 'Sign-in failed. Please try again.');
    }
  };

  window.signInGoogle = async () => {
    setLoading('btn-google', true);
    try {
      await signInWithPopup(auth, new GoogleAuthProvider());
      window.location.href = REDIRECT;
    } catch (e) {
      setLoading('btn-google', false);
      if (e.code !== 'auth/popup-closed-by-user') showError('Google sign-in failed. Please try again.');
    }
  };

  window.signInApple = async () => {
    setLoading('btn-apple', true);
    try {
      const provider = new OAuthProvider('apple.com');
      provider.addScope('email');
      provider.addScope('name');
      await signInWithPopup(auth, provider);
      window.location.href = REDIRECT;
    } catch (e) {
      setLoading('btn-apple', false);
      if (e.code !== 'auth/popup-closed-by-user') showError('Apple sign-in failed. Please try again.');
    }
  };

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.signInEmail();
  });
</script>
</body>
</html>
